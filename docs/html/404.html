<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Converts the path into a query string so index.html can restore it
    // e.g. /ntl-running-tournaments/html/calendar → /ntl-running-tournaments/html/?p=/calendar
    var repo = '/ntl-running-tournaments/html/';
    var fullPath = location.pathname;
    var route = fullPath.startsWith(repo) ? fullPath.slice(repo.length - 1) : fullPath;
    var search = location.search ? '&' + location.search.slice(1) : '';
    location.replace(repo + '?p=' + encodeURIComponent(route) + search + location.hash);
  </script>
</head>

<body>
  <p>Redirecting&hellip;</p>
</body>

</html>
