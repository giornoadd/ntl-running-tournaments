  <!-- GitHub Pages SPA redirect: restore route from ?p= query param set by 404.html -->
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var route = params.get('p');
      if (route) {
        params.delete('p');
        var remaining = params.toString();
        var newUrl = route + (remaining ? '?' + remaining : '') + location.hash;
        history.replaceState(null, '', newUrl);
      }
    })();
  </script>
