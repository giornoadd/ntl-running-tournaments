<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Debug</title>
</head>

<body>
    <div id="out"></div>
    <script type="module">
        import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';
        import DOMPurify from 'https://cdn.jsdelivr.net/npm/dompurify/dist/purify.es.js';

        marked.use({
            renderer: {
                link(token) {
                    let { href, text, title } = token;
                    if (href.match(/\.(jpg|jpeg|png|gif|webp|JPG|JPEG|PNG)$/)) {
                        return `<a href="${href}" target="_blank" rel="noopener noreferrer"><img src="${href}" alt="${text}" class="w-16 h-16 object-cover inline-block rounded-lg shadow-sm border border-black mx-1" loading="lazy" /></a>`;
                    }
                    return false;
                }
            }
        });

        const text = "| 1 | 2026-03-02 | Mon, Mar 02 | **9.47 km** | 🏃 6km Easy Run + Morning Walk | [📸1](../member_results/Manda-1_โจ (GIO)/running-pics/gio-2026-mar-02.jpg) [📸2](../member_results/Manda-1_โจ (GIO)/running-pics/gio-2026-mar-02_1.jpg) |";

        const preprocessedText = text.replace(
            /\[(📸[^\]]*)\]\((.*?\.(?:jpg|jpeg|png|gif|webp|JPG|JPEG|PNG))\)/g,
            (_match, p1, p2) => {
                const encoded = p2.replace(/ /g, "%20").replace(/\(/g, "%28").replace(/\)/g, "%29");
                return `[${p1}](${encoded})`;
            }
        );

        const html = marked.parse(preprocessedText);
        const clean = DOMPurify.sanitize(html, { ADD_ATTR: ['target'] });

        document.getElementById('out').innerHTML = `
            <h3>Raw text:</h3> <pre>${text}</pre>
            <h3>Preprocessed:</h3> <pre>${preprocessedText}</pre>
            <h3>Marked Output (encoded):</h3> <pre>${html.replace(/</g, '&lt;')}</pre>
            <h3>Purified Output:</h3> <div>${clean}</div>
            <pre>${clean.replace(/</g, '&lt;')}</pre>
        `;
    </script>
</body>

</html>
